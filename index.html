<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Image Filter Editor</h1>
        <div class="editor-wrap">
            <div class="controls">
                <input type="file" id="upload" accept="image/*">
                
                <div class="slider-group">
                    <label>Blur: <span id="blur-val">0px</span></label>
                    <input type="range" id="blur" min="0" max="20" value="0">
                </div>
                <div class="slider-group">
                    <label>Brightness: <span id="brightness-val">100%</span></label>
                    <input type="range" id="brightness" min="0" max="200" value="100">
                </div>
                <div class="slider-group">
                    <label>Contrast: <span id="contrast-val">100%</span></label>
                    <input type="range" id="contrast" min="0" max="200" value="100">
                </div>
                <div class="slider-group">
                    <label>Grayscale: <span id="grayscale-val">0%</span></label>
                    <input type="range" id="grayscale" min="0" max="100" value="0">
                </div>
                
                <button id="reset-btn">Reset Filters</button>
                
            </div>
            <div class="image-preview">
                <img id="image" src="https://images.unsplash.com/photo-1506744626753-dba7d41543f4?w=800" alt="preview">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
